<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stránka nenalezena — Aleš Markvart</title>
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#e36402">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #080808;
      --gold: #e36402;
      --text: #e8e4dc;
      --text-muted: #888880;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-font-smoothing: antialiased; }
    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
    }
    p {
      font-size: 1rem;
      color: var(--text-muted);
      max-width: 320px;
      line-height: 1.7;
    }
    a.back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--black);
      background: var(--gold);
      padding: 0.65rem 1.4rem;
      border-radius: 2px;
      text-decoration: none;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    a.back:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <a href="/" class="logo">Aleš Markvart</a>
  <h1>404</h1>
  <p>Tato stránka neexistuje nebo byla přesunuta.</p>
  <a href="/" class="back">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M13 8H3M7 4l-4 4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Zpět na úvod
  </a>
</body>
</html>
